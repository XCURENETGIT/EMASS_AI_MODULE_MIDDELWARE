services:
  emass-ai-middelware:
    container_name: emass-ai-middelware
    image: emass-ai-middelware:0.0.0
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    volumes:
      - ./workspace:/app:z
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
    command: python3 /app/kafka_worker.py
    restart: always